<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll • TourVista</title>
    
    <!-- Bootstrap 5.3 (modern & fully responsive) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" 
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #0d6efd;
        }
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9f0ff);
            min-height: 100vh;
        }
        .enroll-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 520px;
            margin: 0 auto;
        }
        .form-control, .form-select {
            border-radius: 12px;
            padding: 14px 16px;
        }
        .btn-enroll {
            border-radius: 50px;
            padding: 14px 40px;
            font-weight: 600;
            font-size: 1.1rem;
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <!-- Modern Card -->
                <div class="card enroll-card">
                    
                    <div class="card-header bg-white border-0 text-center pt-5 pb-3">
                        <div class="mx-auto mb-3 d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle" style="width: 70px; height: 70px;">
                            <i class="fa fa-ticket-alt fa-3x text-primary"></i>
                        </div>
                        <h1 class="display-5 fw-bold text-dark mb-1">Enroll Now</h1>
                        <p class="text-muted lead">Complete your booking in seconds</p>
                    </div>

                    <div class="card-body px-4 px-md-5 pb-5">
                        
                        <form method="POST" class="needs-validation" novalidate>
                            {% csrf_token %}
                            
                            <!-- Django form rendered nicely -->
                            <div class="mb-4">
                                {{ form.as_p }}
                            </div>

                            <!-- Modern Submit Button -->
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-enroll">
                                    <i class="fa fa-credit-card me-2"></i>
                                    Proceed to Checkout
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Footer / Back Button -->
                    <div class="card-footer bg-white border-0 text-center py-4">
                        <a href="{% url 'homeView' %}" class="text-decoration-none">
                            <button type="button" class="btn btn-outline-secondary btn-enroll px-5">
                                <i class="fa fa-arrow-left me-2"></i>
                                Turn Back
                            </button>
                        </a>
                    </div>
                </div>

                <!-- Trust Signals -->
                <div class="text-center mt-4 text-muted small">
                    <i class="fa fa-lock me-1"></i> 
                    Secure &amp; Encrypted • 
                    <i class="fa fa-shield-alt me-1"></i> 
                    100% Safe Booking
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        // Optional: Auto-highlight form errors (Bootstrap 5 validation style)
        (function () {
            'use strict';
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>

</body>
</html>
