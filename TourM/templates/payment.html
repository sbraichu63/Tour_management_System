{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #E6E6FA, #F8F8FF);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 16px;
            border: none;
            background: #ffffff;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #d6d6f5;
        }

        .btn-primary {
            background: #b8a9ff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }

        .title {
            color: #6c63ff;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <h2 class="text-center title mb-4">💳 Secure Payment</h2>

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <!-- ✅ Booking Summary (Dynamic) -->
                    <div class="mb-4 p-3 bg-light rounded-3">
                        <h5 class="title mb-2">
                            <i class="fas fa-suitcase me-2"></i>Booking Summary
                        </h5>

                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-muted">Package</span>
                            <span class="fw-semibold">{{ booking.post.title }}</span>
                        </div>

                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-muted">Traveler</span>
                            <span class="fw-semibold">
                                {{ booking.firstname }} {{ booking.lastname }}
                            </span>
                        </div>

                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-muted">Email</span>
                            <span class="fw-semibold">{{ booking.email }}</span>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between fs-5">
                            <span class="fw-bold">Total Amount</span>
                            <span class="fw-bold text-success">
                                ₹{{ booking.post.price }}
                            </span>
                        </div>
                    </div>

                    <!-- ✅ PAYMENT FORM -->
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Card Owner</label>
                            <input type="text" name="card_owner" class="form-control" placeholder="John Doe" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Card Number</label>
                            <div class="input-group">
                                <input 
                                    type="text" 
                                    name="card_number" 
                                    class="form-control" 
                                    placeholder="1234 5678 9012 3456"
                                    required>
                                <span class="input-group-text">
                                    <i class="fab fa-cc-visa"></i>
                                    <i class="fab fa-cc-mastercard ms-2"></i>
                                </span>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Expiry</label>
                                <input type="text" class="form-control" placeholder="MM/YY" required>
                            </div>

                            <div class="col-6 mb-3">
                                <label class="form-label">CVV</label>
                                <input type="password" class="form-control" placeholder="123" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-lock me-2"></i>
                            Pay Now ₹{{ booking.post.price }}
                        </button>

                    </form>

                </div>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'homeView' %}" class="btn btn-warning px-4">
                    ⬅ Go Back
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
