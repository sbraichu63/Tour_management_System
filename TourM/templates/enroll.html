<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #E6E6FA, #F8F8FF);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 16px;
            border: none;
            background: #ffffff;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #d6d6f5;
        }

        .form-control:focus {
            border-color: #b8a9ff;
            box-shadow: 0 0 5px rgba(184, 169, 255, 0.5);
        }

        .btn-primary {
            background: #b8a9ff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: #fff;
        }

        .btn-primary:hover {
            background: #a18eff;
        }

        .btn-warning {
            background: #f1f1f1;
            border: none;
            color: #555;
            border-radius: 10px;
        }

        .btn-warning:hover {
            background: #e2e2e2;
        }

        .title {
            color: #6c63ff;
            font-weight: 700;
        }

        .input-group-text {
            background: #f3f3ff;
            border: 1px solid #d6d6f5;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <h2 class="text-center title mb-4">💳 Secure Payment</h2>

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <form onsubmit="handlePayment(event)">

                        <div class="mb-3">
                            <label class="form-label">Card Owner</label>
                            <input type="text" class="form-control" placeholder="John Doe" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Card Number</label>
                            <div class="input-group">
                                <input type="text" class="form-control" placeholder="1234 5678 9012 3456" required>
                                <span class="input-group-text">
                                    <i class="fab fa-cc-visa"></i>
                                    <i class="fab fa-cc-mastercard ms-2"></i>
                                </span>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Expiry</label>
                                <input type="text" class="form-control" placeholder="MM/YY" required>
                            </div>

                            <div class="col-6 mb-3">
                                <label class="form-label">CVV</label>
                                <input type="password" class="form-control" placeholder="123" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-lock me-2"></i> Pay Now
                        </button>

                    </form>

                </div>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'homeView' %}">
                    <button class="btn btn-warning px-4">⬅ Go Back</button>
                </a>
            </div>

        </div>
    </div>
</div>

<script>
    function handlePayment(event) {
        event.preventDefault();
        alert("✅ Payment Successful!\nRedirecting...");
        window.location.href = "/";
    }
</script>

</body>
</html>
