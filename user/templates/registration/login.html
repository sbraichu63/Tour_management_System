<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tour Management</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'login.css' %}">
</head>

<body>
    <!-- Abstracted BG out for cleaner mobile rendering -->
    <div class="bg-wrapper"></div>
    
    <div class="login-box">
        <h2>Welcome Back</h2>
        <form method="POST">
            {% csrf_token %} 
            <div class="form-group">
                {{ form.as_p }}
            </div>
            
            <button type="submit" class="auth-btn">Login</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'register' %}">Sign Up</a></p>
        </div>
    </div>

    <!-- Inject JS to add placeholder text to Django rendered inputs dynamically -->
    <script>
        document.querySelectorAll('.form-group input').forEach(input => {
            // Get label text and assign it to placeholder
            let labelText = input.name.charAt(0).toUpperCase() + input.name.slice(1);
            input.setAttribute('placeholder', labelText);
        });
    </script>
</body>

</html>
